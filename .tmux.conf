# ~/.tmux.conf — nb30
#
# Standard-Keybinds, absichtlich unangetastet: Prefix C-b, teilen mit % und ",
# Panes mit den Pfeiltasten, Zoom mit z, Fenster ab 0. Damit passt jede Anleitung
# im Netz, es gilt dasselbe am Framework und am VPS (der gar keine Config hat),
# und C-a bleibt in der Shell der Sprung an den Zeilenanfang.
#
# FARBEN — hier steht bewusst KEIN Hex.
# Die Linux-Textkonsole kann nur 16 Farben. Hex-Werte (#2e3440 usw.) werden dort
# beliebig gemappt, das sieht schmutzig aus. Mit ANSI-Indizes (colour0..15) folgt
# tmux dagegen der Palette des Terminals, in dem es gerade laeuft: in der TTY die
# Standardfarben, in einem Terminal mit Nord-Palette automatisch Nord.
# Eine Config, ueberall stimmig — und nichts, was am Framebuffer haengenbleibt.

### Grundlagen ---------------------------------------------------------------
# screen-256color, nicht tmux-256color: letzteres braucht ein terminfo, das auf
# einem frischen Void fehlen kann — dann startet tmux gar nicht.
set -g default-terminal "screen-256color"
set -g mouse on
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g status-interval 60

# Einzige Zugabe zu den Griffen: r laedt die Config neu.
# r ist im Standard unbelegt, ueberschreibt also nichts.
bind r source-file ~/.tmux.conf \; display "tmux.conf neu geladen"

### Statusleiste — auf Lesbarkeit gebaut, nicht auf Farbe ------------------
# Kein Blau, kein Cyan: farbige Bloecke sind auf der TTY zu hell, und heller
# Text darauf wird unleserlich. Was hervorgehoben gehoert, wird stattdessen
# INVERTIERT — schwarz auf weiss. Maximaler Kontrast, unabhaengig davon,
# welche Palette das Terminal gerade fuehrt.
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour0,fg=colour7"

# Session-Name: invertiert, fett
set -g status-left "#[bg=colour15,fg=colour0,bold] #S #[default] "
set -g status-left-length 24

# Uhrzeit: hell und fett, aber ohne Block dahinter
set -g status-right "#[fg=colour7]%d.%m.  #[fg=colour15,bold]%H:%M "
set -g status-right-length 40

# Fenster-Reiter: das aktive invertiert, die uebrigen gedaempft
setw -g window-status-format         "#[fg=colour8] #I #W "
setw -g window-status-current-format "#[bg=colour15,fg=colour0,bold] #I #W "
setw -g window-status-style          "bg=colour0,fg=colour7"
setw -g window-status-separator ""

# Panes / Nachrichten
set -g pane-border-style        "fg=colour8"
set -g pane-active-border-style "fg=colour7"
set -g message-style "bg=colour15,fg=colour0,bold"
set -g mode-style    "bg=colour15,fg=colour0"

### Plugins (TPM) — Prefix(C-b) + I zum Installieren ------------------------
# install.sh holt TPM; ohne TPM meldet die letzte Zeile nur einen harmlosen Fehler.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Sessions speichern
set -g @plugin 'tmux-plugins/tmux-continuum'    # automatisch sichern/wiederherstellen
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'
