# ~/.tmux.conf — nb30
#
# Standard-Keybinds, absichtlich unangetastet: Prefix C-b, teilen mit % und ",
# Panes mit den Pfeiltasten, Zoom mit z, Fenster ab 0. Damit passt jede Anleitung
# im Netz, es gilt dasselbe am Framework und am VPS (der gar keine Config hat),
# und C-a bleibt in der Shell der Sprung an den Zeilenanfang.
#
# FARBEN — hier steht bewusst KEIN Hex.
# Die Linux-Textkonsole kann nur 16 Farben. Hex-Werte (#2e3440 usw.) werden dort
# beliebig gemappt, das sieht schmutzig aus. Mit ANSI-Indizes (colour0..15) folgt
# tmux dagegen der Palette des Terminals, in dem es gerade laeuft: in der TTY die
# Standardfarben, in einem Terminal mit Nord-Palette automatisch Nord.
# Eine Config, ueberall stimmig — und nichts, was am Framebuffer haengenbleibt.

### Grundlagen ---------------------------------------------------------------
# screen-256color, nicht tmux-256color: letzteres braucht ein terminfo, das auf
# einem frischen Void fehlen kann — dann startet tmux gar nicht.
set -g default-terminal "screen-256color"
set -g mouse on
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on

# 15 Sekunden, nicht 1. Die Statusleiste startet bei jeder Aktualisierung
# Shell-Prozesse (cpu, battery) — im Sekundentakt misst der Atom N450 zu einem
# guten Teil sich selbst. 15s ist unmerklich und reicht voellig.
set -g status-interval 15

# Einzige Zugabe zu den Griffen: r laedt die Config neu.
# r ist im Standard unbelegt, ueberschreibt also nichts.
bind r source-file ~/.tmux.conf \; display "tmux.conf neu geladen"

### Statusleiste — dunkelblaue Leiste, weisse Schrift ----------------------
# DREI Grenzen der Linux-Textkonsole, alle real eingetreten:
#
#   1. Der HINTERGRUND kann nur 8 Farben (colour0-7). Die hellen Varianten
#      (colour8-15) gibt es dort nur fuer Schrift, nicht fuer Flaechen.
#      Ein Blaugrau wie in Nord ist damit unmoeglich — colour4 (dunkelblau)
#      ist die einzige blaue Flaeche, die die TTY hergibt.
#   2. Helle Flaechen (cyan colour6) tragen keinen hellen Text. Der Grund muss
#      dunkel sein, dann steht Weiss gut darauf.
#   3. 'bold' hellt in der TTY die VORDERGRUNDFARBE auf. Ein fettes fg=colour0
#      ist nicht schwarz, sondern grau bis weiss — auf hellem Grund
#      verschwindet die Schrift ganz. Also nie 'bold' auf dunklem Vordergrund.
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour4,fg=colour7"

# Links: Session-Name, dahinter die Prefix-Anzeige.
# Die leuchtet auf, sobald du Strg+B gedrueckt hast und tmux auf die naechste
# Taste wartet — man sieht also, ob tmux gerade zuhoert, statt zu raten.
set -g status-left "#[fg=colour15,bold] #S #[fg=colour7]| #{prefix_highlight}"
set -g status-left-length 30

# Rechts: CPU · RAM · Akku · Uhr. Keine Icons — ein PSF-Konsolenfont hat nur ein
# paar hundert Glyphen, Emoji erscheinen dort als leere Kaestchen.
set -g status-right "#[fg=colour7]#{cpu_percentage} CPU  #{ram_percentage} RAM  #{battery_percentage} AKKU  #[fg=colour15,bold]%H:%M "
set -g status-right-length 60

# Aktives Fenster: weiss + fett. Uebrige: gedaempft, aber noch lesbar.
setw -g window-status-format         "#[fg=colour7]  #I #W  "
setw -g window-status-current-format "#[fg=colour15,bold]  #I #W  "
setw -g window-status-style          "bg=colour4"
setw -g window-status-separator ""

# Panes / Nachrichten
set -g pane-border-style        "fg=colour8"
set -g pane-active-border-style "fg=colour7"
set -g message-style "bg=colour4,fg=colour15,bold"
set -g mode-style    "bg=colour4,fg=colour15"

### Plugins (TPM) — Prefix(C-b) + I zum Installieren ------------------------
# install.sh holt TPM; ohne TPM meldet die letzte Zeile nur einen harmlosen Fehler.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'          # Sessions speichern
set -g @plugin 'tmux-plugins/tmux-continuum'          # automatisch sichern/wiederherstellen
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'   # zeigt, wann tmux zuhoert
set -g @plugin 'tmux-plugins/tmux-cpu'                # CPU + RAM
set -g @plugin 'tmux-plugins/tmux-battery'            # Akku

set -g @continuum-restore 'on'

# --- Anzeige der Plugins: Text statt Icons ---
# Ein PSF-Konsolenfont traegt nur ein paar hundert Glyphen. Die Default-Icons
# der Plugins (Emoji, Batteriesymbole) sind nicht dabei und erscheinen als leere
# Kaestchen. Also alles auf reinen Text und Prozentzahlen.
set -g @cpu_percentage_format "%3.0f%%"
set -g @ram_percentage_format "%3.0f%%"
set -g @batt_remain_short 'true'

# Prefix-Anzeige: sichtbar, aber ohne Farbfehler.
# Kein 'bold' auf dunklem Vordergrund — in der TTY hellt bold den Vordergrund
# auf, fettes Schwarz waere grau und auf hellem Grund unsichtbar.
set -g @prefix_highlight_fg 'colour0'
set -g @prefix_highlight_bg 'colour7'
set -g @prefix_highlight_prefix_prompt 'TASTE'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_prompt 'KOPIEREN'
set -g @prefix_highlight_copy_mode_attr 'fg=colour0,bg=colour7'
set -g @prefix_highlight_empty_prompt ''

run '~/.tmux/plugins/tpm/tpm'
