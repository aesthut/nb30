# ~/.tmux.conf — nb30
#
# Laeuft in st unter X (Login -> startx -> st bildschirmfuellend -> tmux).
# Kein Fenstermanager: tmux IST der Fenstermanager, st nur die Leinwand.
# Damit gibt es hier Truecolor und eine echte Schrift — anders als in der
# nackten Textkonsole, die nur 16 Farben und Bitmap-Fonts kann.
#
# Standard-Keybinds, absichtlich unangetastet: Prefix C-b, teilen mit % und ",
# Panes mit den Pfeiltasten, Zoom mit z, Fenster ab 0. Damit passt jede
# Anleitung im Netz, und der VPS (tmux ohne Config) fuehlt sich gleich an.
#
# Nord (Polar Night):
#   Grund #2e3440 · Leiste #3b4252 (blaugrau) · Rahmen #4c566a
#   Text #d8dee9 · hell #eceff4 · Akzent Frost-Cyan #88c0d0 · blau #81a1c1

### Grundlagen ---------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",st*:Tc,*256col*:Tc"   # Truecolor in st
set -g mouse on
set -g history-limit 10000
set -sg escape-time 10
set -g focus-events on
set -g status-interval 60

# Einzige Zugabe zu den Griffen: r laedt die Config neu.
# r ist im Standard unbelegt, ueberschreibt also nichts.
bind r source-file ~/.tmux.conf \; display "tmux.conf neu geladen"

### Statusleiste — blaugrau (nord1), Akzent Frost-Cyan ----------------------
# Keine hellen Bloecke mit hellem Text — das war in der TTY unlesbar und ist
# auch hier keine gute Idee. Hervorgehoben wird ueber Farbe und Fettung, der
# Grund der Leiste bleibt durchgehend das ruhige Blaugrau.
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#3b4252,fg=#d8dee9"

set -g status-left "#[fg=#eceff4,bold] #S #[fg=#4c566a]│"
set -g status-left-length 24

set -g status-right "#[fg=#81a1c1]%d.%m.  #[fg=#eceff4,bold]%H:%M "
set -g status-right-length 40

# Aktives Fenster: Frost-Cyan und fett. Uebrige: gedaempft.
setw -g window-status-format         "#[fg=#6c7a94]  #I #W  "
setw -g window-status-current-format "#[fg=#88c0d0,bold]  #I #W  "
setw -g window-status-style          "bg=#3b4252"
setw -g window-status-separator ""

# Panes / Nachrichten
set -g pane-border-style        "fg=#3b4252"
set -g pane-active-border-style "fg=#88c0d0"
set -g message-style "bg=#3b4252,fg=#88c0d0,bold"
set -g mode-style    "bg=#88c0d0,fg=#2e3440"

### Plugins (TPM) — Prefix(C-b) + I zum Installieren ------------------------
# install.sh holt TPM; ohne TPM meldet die letzte Zeile nur einen harmlosen Fehler.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # Sessions speichern
set -g @plugin 'tmux-plugins/tmux-continuum'    # automatisch sichern/wiederherstellen
set -g @continuum-restore 'on'
run '~/.tmux/plugins/tpm/tpm'
